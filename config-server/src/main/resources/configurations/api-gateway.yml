spring:
  application:
    name: api-gateway
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
            - id: event-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/event/**
            - id: analytics-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/analytics/**
            - id: product-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/product/**
            - id: recommendation-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/recommendation/**

server:
  port: 8080

eureka:
  client:
    register-with-eureka: false

jwt:
  secret: ${JWT_SECRET}
